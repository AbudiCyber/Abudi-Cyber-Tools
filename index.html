<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Abudi Cyber Tools</title>

<!-- Prevent aggressive caching in browsers (helps when Pages updates) -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link rel="stylesheet"
href="style.css?v=7ed350c">

</head>

<body>

<div class="container">

<h1>🛡️ Abudi Cyber Tools</h1>

<p>
Simple Cyber Security Tools
</p>


<!-- Text Analyzer -->

<div class="card">

<h2>📝 Text Analyzer</h2>

<textarea
id="textInput"
placeholder="Enter text here..."></textarea>

<button id="analyzeTextBtn">

Analyze Text

</button>

</div>


<!-- Password Checker -->

<div class="card">

<h2>🔐 Password Checker</h2>

<input
type="text"
id="passwordInput"
placeholder="Enter password">

<button id="checkPasswordBtn">

Check Password

</button>

</div>


<!-- Password Generator -->

<div class="card">

<h2>🎲 Password Generator</h2>

<select id="passwordLength">

<option value="8">8</option>

<option value="12" selected>12</option>

<option value="16">16</option>

<option value="20">20</option>

<option value="24">24</option>

</select>

<button id="generatePasswordBtn">

Generate Password

</button>

<button id="copyPasswordBtn">

📋 Copy Password

</button>

</div>


<!-- Link Analyzer -->

<div class="card">

<h2>🔗 Link Analyzer</h2>

<input
type="text"
id="linkInput"
placeholder="https://example.com">

<button id="analyzeLinkBtn">

Analyze Link

</button>

</div>


<!-- Hash Generator -->

<div class="card">

<h2>🔐 Hash Generator</h2>

<input
type="text"
id="hashInput"
placeholder="Enter text to hash">

<select id="hashType">

<option value="SHA-256">SHA-256</option>

<option value="SHA-1">SHA-1</option>

</select>

<button id="generateHashBtn">

Generate Hash

</button>

</div>


<!-- Email Validator -->

<div class="card">

<h2>👁️ Email Validator</h2>

<input type="text" id="emailInput" placeholder="Enter email">

<button id="validateEmailBtn">

Validate Email

</button>

</div>


<!-- Base64 Tool -->

<div class="card">

<h2>🔢 Base64 Encoder / Decoder</h2>

<textarea id="base64Input" placeholder="Enter text..."></textarea>

<button id="encodeBtn">

Encode Base64

</button>

<br><br>

<button id="decodeBtn">

Decode Base64

</button>

</div>


<!-- Results -->

<div class="card">

<h2>📊 Results</h2>

<div id="results">

Waiting for analysis...

</div>

<button id="clearResultsBtn">

🧹 Clear Results

</button>

</div>


</div>

<script src="script.js?v=7ed350c"></script>

</body>

</html>
