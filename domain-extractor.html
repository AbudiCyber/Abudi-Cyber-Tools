<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Domain Extractor Pro</title>

  <link
    rel="stylesheet"
    href="style.css?v=visual-trust-1-8-4"
  >
</head>

<body>
  <div class="container">
    <p>
      <a
        href="index.html"
        style="color:#fff;font-weight:700;text-decoration:none"
      >
        ← Back to Abudi Cyber Tools
      </a>
    </p>

    <h1>🌐 Domain Extractor Pro</h1>

    <p>
      Privacy-first browser tool. Nothing is uploaded.
    </p>

    <div class="card">
      <input
        id="i"
        placeholder="example.com/path?x=1#top"
      >

      <button id="a">
        Analyze Domain
      </button>

      <div
        id="r"
        class="tool-result"
        style="white-space:pre-line;overflow-wrap:anywhere"
      >
        Waiting for domain input...
      </div>

      <div class="tool-actions">
        <button
          id="c"
          class="action-btn copy-btn"
        >
          📋 Copy Result
        </button>

        <button
          id="x"
          class="action-btn clear-btn"
        >
          🧹 Clear
        </button>
      </div>
    </div>
  </div>

  <script src="domain-extractor-v1-9.js?v=1-9-0"></script>
  <script src="domain-extractor-bootstrap-v1-9.js?v=1-9-1"></script>
  <script>
    const q = id => document.getElementById(id);

    const i = q("i");
    const r = q("r");


    q("x").onclick = () => {
      i.value = "";
      r.textContent = "Waiting for domain input...";
    };

     q("c").onclick = async () => {
  const text = r.textContent.trim();

  if (
    !text ||
    text === "Waiting for domain input..."
  ) {
    r.textContent = "Analyze a domain before copying the result.";
    return;
  }

  try {
    await navigator.clipboard.writeText(text);

    const originalText = q("c").textContent;
    q("c").textContent = "✅ Copied";

    setTimeout(() => {
      q("c").textContent = originalText;
    }, 1500);
  } catch (error) {
    const textarea = document.createElement("textarea");

    textarea.value = text;
    textarea.setAttribute("readonly", "");
    textarea.style.position = "fixed";
    textarea.style.opacity = "0";

    document.body.appendChild(textarea);

    textarea.select();
    textarea.setSelectionRange(0, textarea.value.length);

    const copied = document.execCommand("copy");

    document.body.removeChild(textarea);

    const originalText = q("c").textContent;

    q("c").textContent = copied
      ? "✅ Copied"
      : "❌ Copy failed";

    setTimeout(() => {
      q("c").textContent = originalText;
    }, 1500);
  }
};

  </script>
</body>
</html>
