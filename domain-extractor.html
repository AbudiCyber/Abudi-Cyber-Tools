<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Domain Extractor Pro</title>

  <link
    rel="stylesheet"
    href="style.css?v=visual-trust-1-8-4"
  >
</head>

<body>
  <div class="container">
    <p>
      <a
        href="index.html"
        style="color:#fff;font-weight:700;text-decoration:none"
      >
        ← Back to Abudi Cyber Tools
      </a>
    </p>

    <h1>🌐 Domain Extractor Pro</h1>

    <p>
      Privacy-first browser tool. Nothing is uploaded.
    </p>

    <div class="card">
      <input
        id="i"
        placeholder="example.com/path?x=1#top"
      >

      <button id="a">
        Analyze Domain
      </button>

      <div
        id="r"
        class="tool-result"
        style="white-space:pre-line;overflow-wrap:anywhere"
      >
        Waiting for domain input...
      </div>

      <div class="tool-actions">
        <button
          id="c"
          class="action-btn copy-btn"
        >
          📋 Copy Result
        </button>

        <button
          id="x"
          class="action-btn clear-btn"
        >
          🧹 Clear
        </button>
      </div>
    </div>
  </div>

  <script src="domain-extractor-v1-9.js?v=1-9-0"></script>

  <script>
    const q = id => document.getElementById(id);

    const i = q("i");
    const r = q("r");

    q("a").onclick = () => {
      try {
        const d = AbudiDomainExtractor.extractDomain(i.value);

        r.textContent =
          "Protocol: " + d.protocol + "\n" +
          "Hostname: " + d.hostname + "\n" +
          "Port: " + d.port + "\n" +
          "Path: " + d.path + "\n" +
          "Query: " + d.query + "\n" +
          "Fragment: " + d.fragment;
      } catch (e) {
        r.textContent =
          "Please enter a valid domain or URL. Example: example.com";
      }
    };

    q("x").onclick = () => {
      i.value = "";
      r.textContent = "Waiting for domain input...";
    };

    q("c").onclick = () => {
      navigator.clipboard?.writeText(r.textContent);
    };
  </script>
</body>
</html>
